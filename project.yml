# XcodeGen project specification
# Generate the Xcode project with:  xcodegen generate
name: DeveloperSoftPhone
options:
  bundleIdPrefix: com.badrs
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: ar
  xcodeVersion: "15.0"

packages:
  linphonesw:
    url: https://gitlab.linphone.org/BC/public/linphone-sdk-swift-macos.git
    from: 5.4.0

settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # Universal binary: Apple Silicon + Intel
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Developer Team ID before building for distribution
    DEVELOPMENT_TEAM: ""

targets:
  DeveloperSoftPhone:
    type: application
    platform: macOS
    scheme:
      configVariants: []
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: linphonesw
        product: linphonesw
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Developer SoftPhone
        CFBundleName: Developer SoftPhone
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: ar
        CFBundleLocalizations: [ar, en]
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.business
        NSMicrophoneUsageDescription: يحتاج التطبيق إلى الوصول للميكروفون لإجراء المكالمات الصوتية.
        NSLocalNetworkUsageDescription: يحتاج التطبيق إلى الوصول للشبكة المحلية للاتصال بخوادم الاتصال الداخلية (PBX).
        LSUIElement: false
        NSHumanReadableCopyright: © 2026 Badr. All rights reserved.
    entitlements:
      path: Resources/DeveloperSoftPhone.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.microphone: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.badrs.softphone
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
